<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buy an AMG</title>
    <style>
      body {
          background-image: url('/Images/black-mercedes-amg-car.jpg');
          background-size: cover;
          color: white;
          font-family: Arial, sans-serif;
          display: flex;
          flex-direction: column;
          justify-content: center;
          align-items: center;
          height: 100vh;
          text-align: center;
          margin: 0;
      }

      .buy-section {
        background: rgba(34, 34, 34, 0.8);
          padding: 20px;
          border-radius: 10px;
          box-shadow: 0 0 10px rgba(0, 255, 213, 0.7);
      }

      .buy-button {
          display: inline-block;
          background: #00cccc;
          color: #fff;
          padding: 15px 30px;
          text-decoration: none;
          font-size: 18px;
          font-weight: bold;
          border-radius: 5px;
          transition: 0.3s;
      }

      .buy-button:hover {
          background: #008b8b;
          transform: scale(1.1);
      }

      .buy-section p {
        color: rgb(161, 161, 161);
        font-weight: bold;
      }
  </style>
</head>
<body>
    <header>
        <h1>Find Your Dream AMG</h1>
    </header>
    
    <section class="buy-section">
        <p>Looking for the ultimate performance and luxury? Explore the latest AMG models available for purchase.</p>
        <a href="https://www.mercedes-amg.com/en/vehicles.html" class="buy-button" target="_blank">Visit Mercedes-AMG Official</a>
    </section>
    
    <footer>
        <p>&copy; 2025 AMGSpecs | All rights reserved.</p>
    </footer>
</body>
</html>
